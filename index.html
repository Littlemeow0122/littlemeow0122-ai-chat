<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations AI 聊天助手</title>
<link rel="icon" type="image/jpeg" href="icon.jpeg">
<link rel="apple-touch-icon" href="icon.jpeg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

body { font-family: 'Inter', sans-serif; }

.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

.custom-scrollbar::-webkit-scrollbar { width: 6px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

.message-bubble { max-width: 85%; word-wrap: break-word; }
@media (max-width: 640px) { .message-bubble { max-width: 95%; } }

.typing-dot { animation: typing 1.4s infinite ease-in-out both; }
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes typing { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

.file-preview { transition: all 0.2s ease; }
.file-preview:hover { transform: translateY(-2px); }

pre { position: relative; }
.copy-code-btn { position: absolute; top: 8px; right: 8px; opacity: 0; transition: opacity 0.2s; }
pre:hover .copy-code-btn { opacity: 1; }
</style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen overflow-hidden">
<div class="flex h-full">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-80 bg-slate-950 border-r border-slate-800 flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-20 h-full">
        <!-- Header -->
        <div class="p-4 border-b border-slate-800">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="font-bold text-lg">AI 聊天助手</h1>
            </div>
            <button onclick="chatApp.newChat()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2 px-4 flex items-center justify-center gap-2 transition-colors">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span>新對話</span>
            </button>
        </div>
        <!-- Model Selector -->
        <div class="p-4 border-b border-slate-800">
            <label class="text-xs text-slate-400 block mb-2">選擇模型</label>
            <select id="modelSelector" onchange="chatApp.changeModel(this.value)" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                <option value="openai">OpenAI GPT-4o</option>
                <option value="mistral">Mistral Large</option>
                <option value="llama">Llama 3</option>
                <option value="claude">Claude 3</option>
                <option value="gemini">Gemini Pro</option>
            </select>
        </div>
        <!-- Chat List -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-2" id="chatList"></div>
        <!-- Footer -->
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500">
            <div class="flex items-center gap-2 mb-2">
                <i data-lucide="info" class="w-4 h-4"></i>
                <span>使用 Pollinations AI API</span>
            </div>
            <button onclick="chatApp.clearAllChats()" class="text-red-400 hover:text-red-300 flex items-center gap-1 mt-2">
                <i data-lucide="trash-2" class="w-3 h-3"></i>清除所有對話
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-slate-900 relative">
        <!-- Mobile Header -->
        <div class="md:hidden flex items-center justify-between p-4 border-b border-slate-800 bg-slate-950">
            <button onclick="chatApp.toggleSidebar()" class="p-2 hover:bg-slate-800 rounded-lg">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <span class="font-semibold" id="mobileTitle">新對話</span>
            <button onclick="chatApp.newChat()" class="p-2 hover:bg-slate-800 rounded-lg">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Desktop Header -->
        <div class="hidden md:flex items-center justify-between p-4 border-b border-slate-800 bg-slate-950/50 backdrop-blur">
            <div class="flex items-center gap-3">
                <h2 id="currentChatTitle" class="font-semibold text-lg">新對話</h2>
                <span id="currentModelBadge" class="px-2 py-1 bg-slate-800 text-slate-400 text-xs rounded-full border border-slate-700">OpenAI</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="chatApp.editTitle()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-slate-200" title="重新命名">
                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                </button>
                <button onclick="chatApp.deleteCurrentChat()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-red-400" title="刪除對話">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4"></div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="hidden px-4 py-2">
            <div class="flex items-center gap-2 text-slate-400 text-sm">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
                </div>
                <span>AI 思考中...</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 border-t border-slate-800 bg-slate-950">
            <div id="filePreviewArea" class="hidden mb-3 flex flex-wrap gap-2"></div>
            <div class="flex items-end gap-2 bg-slate-900 rounded-2xl border border-slate-700 p-2 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                <button onclick="document.getElementById('fileInput').click()" class="p-2 hover:bg-slate-800 rounded-xl text-slate-400 hover:text-blue-400 transition-colors flex-shrink-0" title="上傳檔案或圖片">
                    <i data-lucide="paperclip" class="w-5 h-5"></i>
                </button>
                <input type="file" id="fileInput" class="hidden" multiple accept="image/*,.txt,.js,.html,.css,.json,.py,.java,.cpp,.c,.php,.rb,.go,.rs" onchange="chatApp.handleFileSelect(event)">
                <textarea id="messageInput" rows="1" placeholder="輸入訊息..." class="flex-1 bg-transparent border-none outline-none resize-none py-2 px-1 max-h-32 scrollbar-hide text-slate-200 placeholder-slate-500" onkeydown="chatApp.handleKeyDown(event)" oninput="chatApp.autoResize(this)"></textarea>
                <button onclick="chatApp.sendMessage()" id="sendButton" class="p-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-700 disabled:cursor-not-allowed text-white rounded-xl transition-colors flex-shrink-0">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="text-xs text-slate-500 mt-2 text-center">AI 可能會產生不準確的資訊，請務必驗證重要資訊。</div>
        </div>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebarOverlay" onclick="chatApp.toggleSidebar()" class="fixed inset-0 bg-black/50 z-10 hidden md:hidden backdrop-blur-sm"></div>
    </main>
</div>

<script>
// ChatApp class (完整整合，已移除 DeepSeek)
class ChatApp {
    constructor() {
        this.chats = JSON.parse(localStorage.getItem('pollinations_chats')) || [];
        this.currentChatId = null;
        this.currentModel = 'openai';
        this.selectedFiles = [];
        this.isGenerating = false;
        this.init();
    }

    init() {
        const savedModel = localStorage.getItem('pollinations_model');
        if (savedModel) { this.currentModel = savedModel; document.getElementById('modelSelector').value = savedModel; }
        if (this.chats.length === 0) { this.createNewChat(); } 
        else { this.loadChat(this.chats[0].id); }
        this.renderChatList();
        this.setupEventListeners();
    }

    setupEventListeners() {
        const messagesContainer = document.getElementById('messagesContainer');
        ['dragenter','dragover','dragleave','drop'].forEach(eName => {
            messagesContainer.addEventListener(eName, e => { e.preventDefault(); e.stopPropagation(); });
        });
        messagesContainer.addEventListener('drop', e => this.handleFiles(e.dataTransfer.files));
        document.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let item of items) if (item.type.indexOf('image')!==-1) this.handleFiles([item.getAsFile()]);
        });
    }

    createNewChat() {
        const newChat = { id: Date.now().toString(), title: `新對話 ${this.chats.length+1}`, model: this.currentModel, messages: [], createdAt: new Date().toISOString() };
        this.chats.unshift(newChat);
        this.saveChats();
        this.loadChat(newChat.id);
        this.renderChatList();
        return newChat;
    }

    newChat() { this.createNewChat(); if(window.innerWidth<768) this.toggleSidebar(); }

    loadChat(chatId) {
        const chat = this.chats.find(c => c.id===chatId); if(!chat) return;
        this.currentChatId = chatId; this.currentModel = chat.model || 'openai';
        document.getElementById('modelSelector').value=this.currentModel;
        document.getElementById('currentChatTitle').textContent=chat.title;
        document.getElementById('mobileTitle').textContent=chat.title;
        document.getElementById('currentModelBadge').textContent=this.getModelDisplayName(this.currentModel);
        this.renderMessages();
        this.highlightCurrentChat();
    }

    getModelDisplayName(model) {
        const names = { openai:'GPT-4o', mistral:'Mistral', llama:'Llama 3', claude:'Claude 3', gemini:'Gemini' };
        return names[model]||model;
    }

    renderMessages() {
        const container=document.getElementById('messagesContainer');
        const chat=this.chats.find(c=>c.id===this.currentChatId);
        if(!chat||chat.messages.length===0){
            container.innerHTML=`<div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center p-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-500/20">
                    <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">歡迎使用 AI 聊天助手</h2>
                <p class="text-slate-400 max-w-md mb-8">使用 Pollinations AI 強大的模型進行對話。支援多輪對話、檔案上傳、圖片分析等功能。</p>
            </div>`; lucide.createIcons(); return;
        }
        container.innerHTML='';
        chat.messages.forEach((msg,index)=>{
            const isUser=msg.role==='user';
            const bubble=document.createElement('div');
            bubble.className=`flex ${isUser?'justify-end':'justify-start'} mb-4`;
            let attachmentsHtml='';
            if(msg.attachments&&msg.attachments.length>0){
                attachmentsHtml='<div class="flex flex-wrap gap-2 mb-2">';
                msg.attachments.forEach(att=>{
                    if(att.type==='image'){
                        attachmentsHtml+=`<div class="relative group"><img src="${att.data}" class="max-w-[200px] max-h-[150px] rounded-lg border border-slate-600 object-cover cursor-pointer hover:opacity-90 transition-opacity" onclick="window.open('${att.data}')"><div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg flex items-center justify-center"><span class="text-xs text-white">${att.name}</span></div></div>`;
                    }else{
                        const ext=att.name.split('.').pop().toUpperCase();
                        attachmentsHtml+=`<div class="bg-slate-800 border border-slate-700 rounded-lg p-2 flex items-center gap-2 max-w-[200px]"><div class="w-8 h-8 bg-blue-900/50 rounded flex items-center justify-center text-xs font-bold text-blue-400">${ext}</div><span class="text-xs text-slate-300 truncate flex-1">${att.name}</span></div>`;
                    }
                });
                attachmentsHtml+='</div>';
            }
            const content=this.formatMessage(msg.content);
            bubble.innerHTML=`<div class="message-bubble ${isUser?'bg-blue-600 text-white':'bg-slate-800 text-slate-200'} rounded-2xl px-4 py-3 shadow-sm">${attachmentsHtml}<div class="prose prose-invert max-w-none text-sm">${content}</div><div class="text-xs mt-1 opacity-50 ${isUser?'text-right':'text-left'}">${new Date(msg.timestamp).toLocaleTimeString()}</div></div>`;
            container.appendChild(bubble);
        });
        this.addCopyButtons();
        container.scrollTop=container.scrollHeight;
    }

    formatMessage(content){marked.setOptions({breaks:true,gfm:true,highlight:function(code,lang){return lang&&hljs.getLanguage(lang)?hljs.highlight(code,{language:lang}).value:hljs.highlightAuto(code).value;}});return marked.parse(content);}
    addCopyButtons(){document.querySelectorAll('pre').forEach(pre=>{if(!pre.querySelector('.copy-code-btn')){const btn=document.createElement('button');btn.className='copy-code-btn p-1.5 bg-slate-700 hover:bg-slate-600 rounded text-slate-300 text-xs transition-colors';btn.innerHTML='<i data-lucide="copy" class="w-3 h-3"></i>';btn.onclick=()=>{const code=pre.querySelector('code')?.textContent||pre.textContent;navigator.clipboard.writeText(code);btn.innerHTML='<i data-lucide="check" class="w-3 h-3"></i>';lucide.createIcons();setTimeout(()=>{btn.innerHTML='<i data-lucide="copy" class="w-3 h-3"></i>';lucide.createIcons();},2000);};pre.appendChild(btn);}});lucide.createIcons();}
    
    async sendMessage() {
        if(this.isGenerating) return;
        const input=document.getElementById('messageInput');
        const content=input.value.trim();
        if(!content && this.selectedFiles.length===0) return;
        const chat=this.chats.find(c=>c.id===this.currentChatId);
        if(!chat) return;

        const userMessage={role:'user',content:content,attachments:[...this.selectedFiles],timestamp:new Date().toISOString()};
        let finalContent=content;
        if(this.selectedFiles.length>0){
            const textFiles=this.selectedFiles.filter(f=>f.type==='text');
            if(textFiles.length>0){finalContent+='\n\n[檔案內容]:\n';textFiles.forEach(f=>{finalContent+=`\n--- ${f.name} ---\n${f.data}\n`;});}
        }
        userMessage.finalContent=finalContent;
        chat.messages.push(userMessage);
        input.value=''; input.style.height='auto'; this.selectedFiles=[]; this.renderFilePreviews();
        if(chat.messages.length===1){chat.title=content.slice(0,30)+(content.length>30?'...':'')||'新對話'; document.getElementById('currentChatTitle').textContent=chat.title; document.getElementById('mobileTitle').textContent=chat.title; this.renderChatList();}
        this.renderMessages(); this.saveChats();
        this.setTyping(true); this.isGenerating=true; this.updateSendButton();

        try{
            const apiMessages=chat.messages.slice(-20).map(msg=>({role:msg.role,content:msg.finalContent||msg.content}));
            const response=await fetch('https://text.pollinations.ai/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:apiMessages,model:this.currentModel,seed:Math.floor(Math.random()*1000),jsonMode:false})});
            if(!response.ok) throw new Error('API 請求失敗');
            const aiContent=await response.text();
            chat.messages.push({role:'assistant',content:aiContent,timestamp:new Date().toISOString()});
        }catch(error){console.error(error);chat.messages.push({role:'assistant',content:'抱歉，發生錯誤：'+error.message,timestamp:new Date().toISOString()});}
        finally{this.setTyping(false);this.isGenerating=false;this.updateSendButton();this.renderMessages();this.saveChats();}
    }

    setTyping(show){document.getElementById('typingIndicator').classList.toggle('hidden',!show);}
    updateSendButton(){const btn=document.getElementById('sendButton');if(this.isGenerating){btn.disabled=true;btn.innerHTML='<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>'}else{btn.disabled=false;btn.innerHTML='<i data-lucide="send" class="w-5 h-5"></i>';lucide.createIcons();}}
    handleFileSelect(e){this.handleFiles(e.target.files); e.target.value='';}
    handleFiles(files){Array.from(files).forEach(file=>{const reader=new FileReader(); if(file.type.startsWith('image/')){reader.onload=e=>{this.selectedFiles.push({type:'image',data:e.target.result,name:file.name,size:file.size});this.renderFilePreviews();};reader.readAsDataURL(file);}else{reader.onload=e=>{this.selectedFiles.push({type:'text',data:e.target.result,name:file.name,size:file.size});this.renderFilePreviews();};reader.readAsText(file);}});}
    renderFilePreviews(){const container=document.getElementById('filePreviewArea');if(this.selectedFiles.length===0){container.classList.add('hidden');container.innerHTML='';return;}container.classList.remove('hidden');container.innerHTML='';this.selectedFiles.forEach((file,index)=>{const div=document.createElement('div');div.className='file-preview relative group bg-slate-800 rounded-lg border border-slate-700 overflow-hidden';if(file.type==='image'){div.innerHTML=`<div class="relative w-20 h-20"><img src="${file.data}" class="w-full h-full object-cover"><button onclick="chatApp.removeFile(${index})" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity shadow-md"><i data-lucide="x" class="w-3 h-3"></i></button></div><div class="px-2 py-1 text-xs text-slate-400 truncate max-w-[80px]">${file.name}</div>`;}else{const ext=file.name.split('.').pop().toUpperCase();div.innerHTML=`<div class="flex items-center gap-2 p-2 pr-8"><div class="w-8 h-8 bg-blue-900/50 rounded flex items-center justify-center text-xs font-bold text-blue-400">${ext}</div><span class="text-xs text-slate-300 truncate max-w-[100px]">${file.name}</span><button onclick="chatApp.removeFile(${index})" class="absolute top-1 right-1 w-5 h-5 hover:bg-red-500/20 rounded flex items-center justify-center text-slate-400 hover:text-red-400 transition-colors"><i data-lucide="x" class="w-3 h-3"></i></button></div>`;}container.appendChild(div);});lucide.createIcons();}
    removeFile(index){this.selectedFiles.splice(index,1);this.renderFilePreviews();}
    changeModel(model){this.currentModel=model;localStorage.setItem('pollinations_model',model);const chat=this.chats.find(c=>c.id===this.currentChatId);if(chat){chat.model=model;this.saveChats();}document.getElementById('currentModelBadge').textContent=this.getModelDisplayName(model);}
    renderChatList(){const list=document.getElementById('chatList');list.innerHTML='';this.chats.forEach(chat=>{const item=document.createElement('div');const isActive=chat.id===this.currentChatId;item.className=`group flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-colors ${isActive?'bg-blue-600/20 border border-blue-600/30':'hover:bg-slate-800 border border-transparent'}`;item.onclick=()=>this.loadChat(chat.id);item.innerHTML=`<div class="flex-1 min-w-0"><div class="flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4 ${isActive?'text-blue-400':'text-slate-400'} flex-shrink-0"></i><span class="text-sm font-medium truncate ${isActive?'text-blue-100':'text-slate-300'}">${chat.title}</span></div><div class="text-xs text-slate-500 mt-1 ml-6">${new Date(chat.createdAt).toLocaleDateString()} · ${chat.messages.length} 則訊息</div></div><button onclick="event.stopPropagation(); chatApp.deleteChat('${chat.id}')" class="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-500/20 rounded-lg text-slate-400 hover:text-red-400 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;list.appendChild(item);});lucide.createIcons();}
    highlightCurrentChat(){this.renderChatList();}
    editTitle(){const chat=this.chats.find(c=>c.id===this.currentChatId);if(!chat)return;const newTitle=prompt('重新命名對話：',chat.title);if(newTitle&&newTitle.trim()){chat.title=newTitle.trim();document.getElementById('currentChatTitle').textContent=chat.title;document.getElementById('mobileTitle').textContent=chat.title;this.saveChats();this.renderChatList();}}
    deleteChat(chatId){if(!confirm('確定要刪除這個對話嗎？'))return;this.chats=this.chats.filter(c=>c.id!==chatId);if(this.chats.length===0){this.createNewChat();}else if(this.currentChatId===chatId){this.loadChat(this.chats[0].id);}this.saveChats();this.renderChatList();}
    deleteCurrentChat(){this.deleteChat(this.currentChatId);}
    clearAllChats(){if(!confirm('確定要清除所有對話嗎？此操作無法復原。'))return;this.chats=[];this.createNewChat();this.saveChats();}
    saveChats(){localStorage.setItem('pollinations_chats',JSON.stringify(this.chats));}
    handleKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this.sendMessage();}}
    autoResize(t){t.style.height='auto';t.style.height=t.scrollHeight+'px';}
    toggleSidebar(){const s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay');if(s.classList.contains('-translate-x-full')){s.classList.remove('-translate-x-full');o.classList.remove('hidden');}else{s.classList.add('-translate-x-full');o.classList.add('hidden');}}
}

// Initialize app after DOM ready
document.addEventListener('DOMContentLoaded',()=>{window.chatApp=new ChatApp();});
window.addEventListener('resize',()=>{if(window.innerWidth>=768)document.getElementById('sidebarOverlay').classList.add('hidden');});
</script>
</body>
</html>
